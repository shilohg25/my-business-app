<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">AKY logo</title>
  <desc id="desc">AKY text with yellow fill, red/blue/green outlines on a light gray circle.</desc>
  <circle cx="256" cy="256" r="256" fill="#e5e5e5"/>

  <!-- A -->
  <text x="92" y="332"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="170"
    font-weight="700"
    fill="#ffef00"
    stroke="#ff2d1f"
    stroke-width="7"
    paint-order="stroke fill"
    letter-spacing="2"
  >A</text>

  <!-- K -->
  <text x="214" y="332"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="170"
    font-weight="700"
    fill="#ffef00"
    stroke="#17257f"
    stroke-width="7"
    paint-order="stroke fill"
    letter-spacing="2"
  >K</text>

  <!-- Y -->
  <text x="332" y="332"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="170"
    font-weight="700"
    fill="#ffef00"
    stroke="#2d5218"
    stroke-width="7"
    paint-order="stroke fill"
    letter-spacing="2"
  >Y</text>
</svg>
