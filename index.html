<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Business App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>My Business App</h1>
    <p class="subtitle">Invoice and payment tracker</p>

    <div class="card">
      <h2>Add Record</h2>

      <label>Customer Name</label>
      <input type="text" id="customerName" placeholder="Enter customer name" />

      <label>Invoice Number</label>
      <input type="text" id="invoiceNumber" placeholder="Enter invoice number" />

      <label>Invoice Amount</label>
      <input type="number" id="invoiceAmount" placeholder="Enter amount" />

      <label>Payment Type</label>
      <select id="paymentType">
        <option value="">Select payment type</option>
        <option value="full">Full</option>
        <option value="partial">Partial</option>
      </select>

      <label>Partial Amount</label>
      <input type="number" id="partialAmount" placeholder="Enter partial amount" />

      <button id="addRecordBtn">Add Record</button>
    </div>

    <div class="card">
      <h2>Summary</h2>
      <p>Total Invoice Amount: <span id="totalInvoice">0.00</span></p>
      <p>Total Paid: <span id="totalPaid">0.00</span></p>
      <p>Total Remaining: <span id="totalRemaining">0.00</span></p>
    </div>

    <div class="card">
      <h2>Records</h2>
      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>Invoice #</th>
            <th>Invoice Amount</th>
            <th>Payment Type</th>
            <th>Paid</th>
            <th>Remaining</th>
          </tr>
        </thead>
        <tbody id="recordsTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
